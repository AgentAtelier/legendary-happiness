# Corridor — a long narrow passage connecting rooms.
# Single axis: runs along X (or Z via rotation). Wall slots on both sides.

name: "Corridor"
description: "A long narrow passageway with wall slots on both sides"
parameters:
  length:  { min: 3, max: 20, default: 8 }
  width:   { min: 1.5, max: 4, default: 2.5 }
  height:  { min: 2.5, max: 4, default: 3 }

# The corridor runs along X from 0 to length, centered at y=0, z=width/2.
anchors:
  center:        { position: ["$length/2", 0, "$width/2"] }
  north_wall:    { position: ["$length/2", "$height/2", 0] }
  south_wall:    { position: ["$length/2", "$height/2", "$width"] }
  start:         { position: [0, 0, "$width/2"] }
  end:           { position: ["$length", 0, "$width/2"] }
  # Slot anchors — spaced along the north wall
  north_start:   { position: [0.8, 0, 0.2] }
  north_mid:     { position: ["$length/2", 0, 0.2] }
  north_end:     { position: ["$length-0.8", 0, 0.2] }
  # South wall
  south_start:   { position: [0.8, 0, "$width-0.2"] }
  south_mid:     { position: ["$length/2", 0, "$width-0.2"] }
  south_end:     { position: ["$length-0.8", 0, "$width-0.2"] }

shell:
  - { name: "Floor", type: "MeshInstance3D", mesh: "plane", color: [0.3, 0.3, 0.35], position: ["$length/2", -0.05, "$width/2"], scale: ["$length/10", 1, "$width/10"] }
  - { name: "Ceiling", type: "MeshInstance3D", mesh: "plane", color: [0.65, 0.65, 0.7], position: ["$length/2", "$height", "$width/2"], scale: ["$length/10", 1, "$width/10"] }

slots:
  north_start_slot:
    anchor: north_start
    offset: [0, 0, 0]
    facing: [0, 0, 1]
    max_footprint: { width: 1.2, depth: 0.6 }

  north_mid_slot:
    anchor: north_mid
    offset: [0, 0, 0]
    facing: [0, 0, 1]
    max_footprint: { width: 1.2, depth: 0.6 }

  north_end_slot:
    anchor: north_end
    offset: [0, 0, 0]
    facing: [0, 0, 1]
    max_footprint: { width: 1.2, depth: 0.6 }

  south_mid_slot:
    anchor: south_mid
    offset: [0, 0, 0]
    facing: [0, 0, -1]
    max_footprint: { width: 1.2, depth: 0.6 }
